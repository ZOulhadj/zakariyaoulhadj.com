baseURL = "https://zakariyaoulhadj.com"
languageCode = "en-gb"
title = "Zakariya Oulhadj"
author = "Zakariya Oulhadj"
theme = "hugo-bearblog"
ignoreLogs = ["warning-goldmark-raw-html"]
enableRobotsTXT = true

[params]
    description = "High Performance Computing (M.Sc.) Graduate from The University of Edinburgh"
    github = "https://github.com/zoulhadj"
    linkedin = "https://linkedin.com/in/zoulhadj"
    instagram = "https://instagram.com/zoulhadj"
    youtube = "https://youtube.com/@ZOulhadj"
    hideMadeWithLine = false

[taxonomies]
    series = 'series'
    tags = 'tags'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    style = 'modus-vivendi'
    tabWidth = 4
    wrapperClass = 'highlight'
